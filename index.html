<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crude Watchlist Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📺 My Watchlist</h1>
        
        <div class="input-section">
            <input type="text" id="titleInput" placeholder="Enter movie or show title...">
            <select id="typeInput">
                <option value="Movie">Movie</option>
                <option value="TV Show">TV Show</option>
            </select>
            <button id="addBtn">Add to List</button>
        </div>

        <div class="filters">
            <button onclick="filterList('all')">All</button>
            <button onclick="filterList('Movie')">Movies</button>
            <button onclick="filterList('TV Show')">TV Shows</button>
        </div>

        <ul id="watchlist"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
